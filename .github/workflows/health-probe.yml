name: API Health Probe

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe /health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "HEALTHCHECK_URL secret is missing" >&2
            exit 1
          fi

          curl -fsS \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            "$HEALTHCHECK_URL/health" | tee /tmp/health.json

          grep -q '"ok":true' /tmp/health.json
